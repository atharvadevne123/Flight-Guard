version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flightguard:flightguard@db:5432/flightguard
      - MODEL_PATH=/app/data/model.joblib
      - METRICS_PATH=/app/data/metrics.json
    volumes:
      - model_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: flightguard
      POSTGRES_PASSWORD: flightguard
      POSTGRES_DB: flightguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
